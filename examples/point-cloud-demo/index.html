<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wasm-spatial-core — Point Cloud Demo (Three.js)</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.1rem;
      background: linear-gradient(135deg, var(--accent), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header .subtitle {
      color: var(--muted);
      font-size: 0.8rem;
    }

    /* Main layout */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .panel-title {
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 8px;
      color: var(--accent);
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.05);
      color: var(--accent);
    }
    .drop-zone .icon {
      font-size: 2rem;
      margin-bottom: 8px;
      display: block;
    }

    /* Progress bar */
    .progress-container {
      display: none;
    }
    .progress-container.active {
      display: block;
    }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 3px;
      transition: width 0.3s;
      width: 0%;
    }
    .progress-text {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* File info */
    .file-info {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.8;
    }
    .file-info .value {
      color: var(--text);
      font-weight: 500;
    }

    /* Controls */
    label {
      font-size: 0.8rem;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }
    select, input[type="range"] {
      width: 100%;
      margin-bottom: 8px;
    }
    select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
    }
    input[type="range"] {
      -webkit-appearance: none;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
    input[type="number"] {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      width: 80px;
      margin-bottom: 8px;
    }

    /* Canvas container */
    .canvas-container {
      flex: 1;
      position: relative;
      background: #000;
    }
    .canvas-container canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Status bar */
    footer {
      padding: 8px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 24px;
      font-size: 0.75rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    footer .stat-value {
      color: var(--text);
      font-weight: 500;
    }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: var(--muted);
      font-size: 0.9rem;
      z-index: 10;
      display: none;
    }
    .loading-overlay.active {
      display: flex;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Hint */
    .hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--muted);
      pointer-events: none;
      z-index: 5;
    }
    .hint .icon {
      font-size: 3rem;
      margin-bottom: 12px;
      display: block;
      opacity: 0.3;
    }
  </style>
</head>
<body>

<header>
  <h1>🌍 wasm-spatial-core</h1>
  <span class="subtitle">Point Cloud Viewer — Three.js + WASM</span>
</header>

<div class="main">
  <aside class="sidebar">
    <!-- Upload -->
    <div class="panel">
      <div class="panel-title">📁 Upload LAS File</div>
      <div id="dropZone" class="drop-zone">
        <span class="icon">📂</span>
        Drag & drop a .las or .laz file here<br>
        or click to browse
      </div>
      <input type="file" id="fileInput" accept=".las,.laz" style="display:none">
      <div id="progressContainer" class="progress-container">
        <div class="progress-bar">
          <div id="progressFill" class="progress-bar-fill"></div>
        </div>
        <div id="progressText" class="progress-text">Initializing...</div>
      </div>
    </div>

    <!-- File info -->
    <div id="fileInfoPanel" class="panel" style="display:none">
      <div class="panel-title">📊 File Info</div>
      <div id="fileInfo" class="file-info"></div>
    </div>

    <!-- Display settings -->
    <div id="controlsPanel" class="panel" style="display:none">
      <div class="panel-title">🎨 Display Settings</div>
      <label>Point Size</label>
      <input type="range" id="pointSize" min="0.5" max="10" step="0.5" value="2">
      <label>Color Mode</label>
      <select id="colorMode">
        <option value="original">Original Colors</option>
        <option value="height">Height Gradient</option>
        <option value="intensity">Intensity (Gray)</option>
      </select>
    </div>

    <!-- Octree params -->
    <div id="octreePanel" class="panel" style="display:none">
      <div class="panel-title">🌳 Octree / Tiling</div>
      <label>Max Points Per Node</label>
      <input type="number" id="maxPointsPerNode" value="50000" min="100" max="1000000" step="1000">
      <button id="rebuildBtn" style="
        background: linear-gradient(135deg, #238636, #2ea043);
        border: none;
        color: white;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 600;
        width: 100%;
        margin-top: 4px;
      ">Rebuild Tileset</button>
    </div>
  </aside>

  <div class="canvas-container">
    <div id="hint" class="hint">
      <span class="icon">☁️</span>
      Load a .las or .laz file to view point cloud
    </div>
    <div id="loadingOverlay" class="loading-overlay">
      <div class="spinner"></div>
      <span id="loadingText">Loading WASM...</span>
    </div>
  </div>
</div>

<footer>
  <span>FPS: <span id="fpsValue" class="stat-value">—</span></span>
  <span>Points: <span id="pointCountValue" class="stat-value">0</span></span>
  <span>Tiles: <span id="tileCountValue" class="stat-value">0</span></span>
  <span>Memory: <span id="memoryValue" class="stat-value">—</span></span>
</footer>

<!-- Three.js from CDN -->
<script src="https://unpkg.com/three@0.170.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.170.0/examples/js/controls/OrbitControls.js"></script>

<script type="module">
// =========================================================================
// WASM Loading
// =========================================================================

let wasm = null;
const WASM_CDN = 'https://unpkg.com/wasm-spatial-core@0.2.0/pkg/wasm_spatial_core.js';

async function loadWasm() {
  showLoading('Loading WASM module...');
  try {
    // Try CDN first
    const module = await import(WASM_CDN);
    await module.default();
    wasm = module;
    return true;
  } catch (e) {
    console.warn('CDN load failed, trying local pkg:', e);
  }

  try {
    // Try local pkg
    const module = await import('../pkg/wasm_spatial_core.js');
    await module.default();
    wasm = module;
    return true;
  } catch (e) {
    console.warn('Local pkg load failed:', e);
    showError('Failed to load WASM module. Run `wasm-pack build` first.');
    return false;
  }
}

// =========================================================================
// Three.js Setup
// =========================================================================

let scene, camera, renderer, controls, pointCloud;

function initThreeJS() {
  const container = document.querySelector('.canvas-container');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0a);

  camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 100000);
  camera.position.set(50, 50, 50);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;

  // Grid helper
  const grid = new THREE.GridHelper(200, 40, 0x333333, 0x1a1a1a);
  scene.add(grid);

  // Axes helper
  const axes = new THREE.AxesHelper(20);
  scene.add(axes);

  window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });
}

// =========================================================================
// FPS Counter
// =========================================================================

let frameCount = 0;
let lastFpsTime = performance.now();

function updateFPS() {
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    document.getElementById('fpsValue').textContent = frameCount;
    frameCount = 0;
    lastFpsTime = now;
  }
}

// =========================================================================
// Animation Loop
// =========================================================================

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  updateFPS();
}

// =========================================================================
// Point Cloud Rendering
// =========================================================================

function createPointCloud(positions, colors, pointSize) {
  if (pointCloud) {
    scene.remove(pointCloud);
    pointCloud.geometry.dispose();
    pointCloud.material.dispose();
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

  let material;
  if (colors && colors.length > 0) {
    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 4));
    material = new THREE.PointsMaterial({
      size: pointSize,
      vertexColors: true,
      sizeAttenuation: true,
    });
  } else {
    material = new THREE.PointsMaterial({
      size: pointSize,
      color: 0x00aaff,
      sizeAttenuation: true,
    });
  }

  pointCloud = new THREE.Points(geometry, material);
  scene.add(pointCloud);

  // Center camera on point cloud
  geometry.computeBoundingBox();
  const box = geometry.boundingBox;
  const center = new THREE.Vector3();
  box.getCenter(center);
  const size = new THREE.Vector3();
  box.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z);

  controls.target.copy(center);
  camera.position.set(
    center.x + maxDim * 0.8,
    center.y + maxDim * 0.8,
    center.z + maxDim * 0.8
  );
  controls.update();
}

function applyHeightColors(positions, minZ, maxZ) {
  const colors = new Float32Array(positions.length / 3 * 4);
  const range = maxZ - minZ || 1;
  for (let i = 0; i < positions.length / 3; i++) {
    const t = (positions[i * 3 + 2] - minZ) / range;
    // Blue → Green → Yellow → Red
    const r = Math.min(1, Math.max(0, t * 2 - 0.5));
    const g = Math.min(1, Math.max(0, t < 0.5 ? t * 2 : 2 - t * 2));
    const b = Math.min(1, Math.max(0, 1 - t * 2));
    colors[i * 4] = r;
    colors[i * 4 + 1] = g;
    colors[i * 4 + 2] = b;
    colors[i * 4 + 3] = 1;
  }
  return colors;
}

function applyOriginalColors(positions, rgbBytes) {
  const colors = new Float32Array(positions.length / 3 * 4);
  for (let i = 0; i < colors.length / 4; i++) {
    colors[i * 4] = rgbBytes[i * 3] / 255;
    colors[i * 4 + 1] = rgbBytes[i * 3 + 1] / 255;
    colors[i * 4 + 2] = rgbBytes[i * 3 + 2] / 255;
    colors[i * 4 + 3] = 1;
  }
  return colors;
}

function applyIntensityColors(positions) {
  const colors = new Float32Array(positions.length / 3 * 4);
  for (let i = 0; i < colors.length / 4; i++) {
    const v = 0.5; // default gray since intensity not easily accessible
    colors[i * 4] = v;
    colors[i * 4 + 1] = v;
    colors[i * 4 + 2] = v;
    colors[i * 4 + 3] = 1;
  }
  return colors;
}

// =========================================================================
// LAS Processing Pipeline
// =========================================================================

let currentPositions = null;
let currentRgbBytes = null;
let currentHeader = null;
let currentFileInfo = null;

async function processLasFile(file) {
  showLoading('Reading file...');
  setProgress(0, 'Reading file...');

  const bytes = new Uint8Array(await file.arrayBuffer());
  const headerBytes = bytes.slice(0, 230);

  showLoading('Parsing LAS header...');
  setProgress(10, 'Parsing header...');

  const header = wasm.parseLasHeader(headerBytes);
  if (!header) {
    showError('Failed to parse LAS header. Is this a valid LAS file?');
    hideLoading();
    return;
  }

  currentHeader = {
    numPoints: header.numPoints(),
    versionMajor: header.versionMajor(),
    versionMinor: header.versionMinor(),
    pointFormatId: header.pointFormatId(),
    pointRecordLength: header.pointDataRecordLength(),
    boundsMinX: header.boundsMinX(),
    boundsMinY: header.boundsMinY(),
    boundsMinZ: header.boundsMinZ(),
    boundsMaxX: header.boundsMaxX(),
    boundsMaxY: header.boundsMaxY(),
    boundsMaxZ: header.boundsMaxZ(),
  };

  showLoading(`Parsing ${currentHeader.numPoints.toLocaleString()} points...`);
  setProgress(20, 'Parsing points...');

  // Auto-detect format (LAS/LAZ/COPC) and parse with progress
  const isLaz = currentHeader.pointFormatId() >= 128;
  let cloud;
  if (isLaz) {
    cloud = wasm.parseLazPointsStream(bytes, (processed, total) => {
      const pct = 20 + Math.floor((processed / total) * 50);
      setProgress(pct, `Decompressing ${processed.toLocaleString()} / ${total.toLocaleString()} points`);
    });
  } else {
    cloud = wasm.parseLasPointsWithProgress(bytes, (processed, total) => {
      const pct = 20 + Math.floor((processed / total) * 50);
      setProgress(pct, `Parsed ${processed.toLocaleString()} / ${total.toLocaleString()} points`);
    });
  }

  if (!cloud) {
    showError('Failed to parse LAS points.');
    hideLoading();
    return;
  }

  const positions = Array.from(cloud.positions());
  const colorsObj = cloud.colors();
  const rgbBytes = colorsObj ? Array.from(colorsObj) : null;

  currentPositions = positions;
  currentRgbBytes = rgbBytes;

  showLoading('Building octree & tiles...');
  setProgress(75, 'Building octree...');

  // Build tileset
  const maxPts = parseInt(document.getElementById('maxPointsPerNode').value) || 50000;
  const tileset = wasm.generateTileset(
    new Float32Array(positions),
    maxPts,
    21, // max_depth
    rgbBytes ? new Uint8Array(rgbBytes) : null,
  );

  const tileCount = tileset.tileCount;
  const totalBytes = tileset.totalBytes;

  setProgress(90, `Generated ${tileCount} tiles (${(totalBytes / 1024).toFixed(1)} KB)`);

  // Display
  const pointSize = parseFloat(document.getElementById('pointSize').value);
  const colorMode = document.getElementById('colorMode').value;

  renderPointCloud(positions, rgbBytes, pointSize, colorMode);

  // File info
  currentFileInfo = {
    name: file.name,
    size: file.size,
    numPoints: currentHeader.numPoints,
    tileCount,
    version: `${currentHeader.versionMajor}.${currentHeader.versionMinor}`,
    format: currentHeader.pointFormatId,
  };
  showFileInfo(currentFileInfo);

  // Memory info
  const mem = wasm.memoryInfo();
  document.getElementById('memoryValue').textContent = formatBytes(mem.used());

  document.getElementById('pointCountValue').textContent = positions.length / 3;
  document.getElementById('tileCountValue').textContent = tileCount;

  setProgress(100, 'Done!');
  document.getElementById('hint').style.display = 'none';

  setTimeout(() => {
    hideLoading();
    document.getElementById('controlsPanel').style.display = 'block';
    document.getElementById('octreePanel').style.display = 'block';
  }, 500);
}

function renderPointCloud(positions, rgbBytes, pointSize, colorMode) {
  let colors;
  switch (colorMode) {
    case 'height': {
      let minZ = Infinity, maxZ = -Infinity;
      for (let i = 0; i < positions.length / 3; i++) {
        const z = positions[i * 3 + 2];
        if (z < minZ) minZ = z;
        if (z > maxZ) maxZ = z;
      }
      colors = applyHeightColors(positions, minZ, maxZ);
      break;
    }
    case 'intensity':
      colors = applyIntensityColors(positions);
      break;
    case 'original':
    default:
      if (rgbBytes && rgbBytes.length > 0) {
        colors = applyOriginalColors(positions, rgbBytes);
      }
      break;
  }

  createPointCloud(positions, colors, pointSize);
}

// =========================================================================
// UI Helpers
// =========================================================================

function showLoading(text) {
  document.getElementById('loadingText').textContent = text || 'Loading...';
  document.getElementById('loadingOverlay').classList.add('active');
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('active');
}

function setProgress(pct, text) {
  const container = document.getElementById('progressContainer');
  container.classList.add('active');
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = text;
  if (pct >= 100) {
    setTimeout(() => container.classList.remove('active'), 2000);
  }
}

function showError(msg) {
  console.error(msg);
  alert(msg);
}

function showFileInfo(info) {
  document.getElementById('fileInfoPanel').style.display = 'block';
  document.getElementById('fileInfo').innerHTML = `
    <div>File: <span class="value">${info.name}</span></div>
    <div>Size: <span class="value">${formatBytes(info.size)}</span></div>
    <div>Points: <span class="value">${info.numPoints.toLocaleString()}</span></div>
    <div>Version: <span class="value">LAS ${info.version}</span></div>
    <div>Format: <span class="value">${info.format}</span></div>
    <div>Tiles: <span class="value">${info.tileCount}</span></div>
  `;
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

// =========================================================================
// Event Handlers
// =========================================================================

function setupEvents() {
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  // Click to upload
  dropZone.addEventListener('click', () => fileInput.click());

  // File input change
  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
      processLasFile(e.target.files[0]);
    }
  });

  // Drag & drop
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
  });

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length > 0) {
      const file = e.dataTransfer.files[0];
      const name = file.name.toLowerCase();
      if (!name.endsWith('.las') && !name.endsWith('.laz')) {
        showError('Please drop a .las or .laz file');
        return;
      }
      processLasFile(file);
    }
  });

  // Point size
  document.getElementById('pointSize').addEventListener('input', (e) => {
    if (pointCloud) {
      pointCloud.material.size = parseFloat(e.target.value);
    }
  });

  // Color mode
  document.getElementById('colorMode').addEventListener('change', () => {
    if (!currentPositions) return;
    const pointSize = parseFloat(document.getElementById('pointSize').value);
    const colorMode = document.getElementById('colorMode').value;
    renderPointCloud(currentPositions, currentRgbBytes, pointSize, colorMode);
  });

  // Rebuild tileset
  document.getElementById('rebuildBtn').addEventListener('click', async () => {
    if (!currentPositions) return;
    showLoading('Rebuilding tileset...');
    setProgress(50, 'Building octree...');

    const maxPts = parseInt(document.getElementById('maxPointsPerNode').value) || 50000;
    const tileset = wasm.generateTileset(
      new Float32Array(currentPositions),
      maxPts,
      21,
      currentRgbBytes ? new Uint8Array(currentRgbBytes) : null,
    );

    document.getElementById('tileCountValue').textContent = tileset.tileCount;
    setProgress(100, `Generated ${tileset.tileCount} tiles`);
    hideLoading();
  });
}

// =========================================================================
// Init
// =========================================================================

(async function main() {
  initThreeJS();
  animate();
  setupEvents();

  const ok = await loadWasm();
  if (ok) {
    console.log('wasm-spatial-core loaded, version:', wasm.version());
    document.getElementById('dropZone').innerHTML = `
      <span class="icon">📂</span>
      Drag & drop a .las or .laz file here<br>
      or click to browse<br>
      <small style="color:var(--muted);margin-top:8px;display:block">
        WASM v${wasm.version()} loaded ✓
      </small>
    `;
  }
})();
</script>

</body>
</html>
