<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wasm-spatial-core — Terrain Demo</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.1rem;
      background: linear-gradient(135deg, var(--accent), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header .subtitle { color: var(--muted); font-size: 0.8rem; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar {
      width: 280px;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .panel-title {
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 8px;
      color: var(--accent);
    }
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.05);
    }
    .drop-zone .icon { font-size: 2rem; margin-bottom: 8px; }
    .drop-zone .label { font-size: 0.85rem; color: var(--muted); }
    .stat {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      padding: 4px 0;
    }
    .stat .label { color: var(--muted); }
    .stat .value { font-weight: 500; }
    .btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 0.8rem;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.secondary { background: var(--border); color: var(--text); }
    select {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 0.8rem;
    }
    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    canvas { width: 100%; height: 100%; display: block; }
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(13, 17, 23, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
    }
    .loading-overlay .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay .status { font-size: 0.85rem; color: var(--muted); }
    .error-overlay {
      position: absolute;
      inset: 0;
      background: rgba(13, 17, 23, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
    }
    .error-overlay .msg { color: var(--red); font-size: 0.85rem; max-width: 400px; text-align: center; }
    .info-bar {
      position: absolute;
      bottom: 12px; left: 12px;
      background: rgba(22, 27, 34, 0.9);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.75rem;
      color: var(--muted);
      z-index: 5;
      display: flex;
      gap: 16px;
    }
    .color-legend {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
    }
    .color-bar {
      width: 100px;
      height: 10px;
      border-radius: 3px;
      background: linear-gradient(90deg, #1a5ab8, #2d8e3e, #d4a017, #d94040, #ffffff);
    }
  </style>
</head>
<body>
  <header><a href="../" style="color:var(--accent);font-size:0.8rem;margin-right:auto">← Home</a>
    <h1>🏔️ Terrain Demo</h1>
    <span class="subtitle">wasm-spatial-core — GeoTIFF → 3D Terrain</span>
  </header>
  <div class="main">
    <div class="sidebar">
      <div class="panel">
        <div class="panel-title">📥 Load GeoTIFF</div>
        <div class="drop-zone" id="dropZone">
          <div class="icon">📄</div>
          <div class="label">Drop GeoTIFF (.tif) file here<br/>or click to browse</div>
        </div>
        <input type="file" id="fileInput" accept=".tif,.tiff" style="display:none" />
      </div>

      <div class="panel" id="infoPanel" style="display:none">
        <div class="panel-title">📊 Info</div>
        <div class="stat"><span class="label">Width</span><span class="value" id="statWidth">—</span></div>
        <div class="stat"><span class="label">Height</span><span class="value" id="statHeight">—</span></div>
        <div class="stat"><span class="label">Resolution</span><span class="value" id="statRes">—</span></div>
        <div class="stat"><span class="label">Min Elev</span><span class="value" id="statMin">—</span></div>
        <div class="stat"><span class="label">Max Elev</span><span class="value" id="statMax">—</span></div>
        <div class="stat"><span class="label">CRS</span><span class="value" id="statCRS">—</span></div>
        <div class="stat"><span class="label">Points</span><span class="value" id="statPoints">—</span></div>
      </div>

      <div class="panel">
        <div class="panel-title">🎨 Display</div>
        <label style="font-size:0.8rem;color:var(--muted);margin-bottom:4px;display:block">Height Scale</label>
        <input type="range" id="heightScale" min="0.1" max="5" step="0.1" value="1" style="width:100%" />
        <div style="font-size:0.75rem;color:var(--muted);text-align:right" id="scaleLabel">1.0×</div>

        <label style="font-size:0.8rem;color:var(--muted);margin-top:8px;margin-bottom:4px;display:block">Color Mode</label>
        <select id="colorMode">
          <option value="height">Height Gradient</option>
          <option value="normal">Normals</option>
          <option value="gray">Grayscale</option>
        </select>
      </div>

      <div class="panel">
        <button class="btn secondary" id="loadDemoBtn">Load Demo Terrain</button>
      </div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas"></canvas>
      <div class="loading-overlay" id="loadingOverlay" style="display:none">
        <div class="spinner"></div>
        <div class="status" id="loadingStatus">Loading...</div>
      </div>
      <div class="error-overlay" id="errorOverlay" style="display:none">
        <div>⚠️</div>
        <div class="msg" id="errorMsg"></div>
        <button class="btn secondary" id="dismissError" style="width:auto;padding:6px 16px">Dismiss</button>
      </div>
      <div class="info-bar" id="infoBar" style="display:none">
        <span>Scroll to zoom · Drag to rotate</span>
        <div class="color-legend">
          <span>Low</span>
          <div class="color-bar"></div>
          <span>High</span>
        </div>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ── WASM Loading ──
    let wasmLoaded = false;
    try {
      const wasm = await import('../pkg/wasm-spatial-core.js');
      await wasm.default();
      Object.assign(window, wasm);
      wasmLoaded = true;
      console.log('[terrain-demo] WASM loaded successfully');
    } catch (e) {
      console.warn('[terrain-demo] WASM not available, using fallback:', e.message);
    }

    // ── State ──
    let scene, camera, renderer, controls;
    let terrainMesh = null;
    let currentElevations = null;
    let currentWidth = 0, currentHeight = 0;

    // ── Init Three.js ──
    function init() {
      const wrap = document.getElementById('canvasWrap');
      const canvas = document.getElementById('canvas');

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0d1117);
      scene.fog = new THREE.FogExp2(0x0d1117, 0.00015);

      camera = new THREE.PerspectiveCamera(60, wrap.clientWidth / wrap.clientHeight, 0.1, 10000);
      camera.position.set(0, 500, 800);

      renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(wrap.clientWidth, wrap.clientHeight);
      renderer.setPixelRatio(window.devicePixelRatio);

      controls = new OrbitControls(camera, canvas);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.target.set(0, 0, 0);

      // Lights
      const ambient = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambient);
      const dir = new THREE.DirectionalLight(0xffffff, 0.8);
      dir.position.set(500, 800, 300);
      scene.add(dir);
      const back = new THREE.DirectionalLight(0x4488ff, 0.3);
      back.position.set(-300, 400, -500);
      scene.add(back);

      // Grid helper
      const grid = new THREE.GridHelper(2000, 40, 0x30363d, 0x21262d);
      grid.position.y = -0.5;
      scene.add(grid);

      window.addEventListener('resize', onResize);
      animate();
    }

    function onResize() {
      const wrap = document.getElementById('canvasWrap');
      camera.aspect = wrap.clientWidth / wrap.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(wrap.clientWidth, wrap.clientHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    // ── Terrain Rendering ──
    function buildTerrain(elevations, w, h, heightScale, colorMode) {
      // Remove old mesh
      if (terrainMesh) {
        scene.remove(terrainMesh);
        terrainMesh.geometry.dispose();
        terrainMesh.material.dispose();
        terrainMesh = null;
      }

      const geo = new THREE.PlaneGeometry(
        w - 1, h - 1, w - 1, h - 1
      );
      geo.rotateX(-Math.PI / 2);

      const pos = geo.attributes.position;
      const colors = new Float32Array(pos.count * 3);

      let minH = Infinity, maxH = -Infinity;
      for (let i = 0; i < elevations.length; i++) {
        if (elevations[i] < minH) minH = elevations[i];
        if (elevations[i] > maxH) maxH = elevations[i];
      }
      const hRange = maxH - minH || 1;

      for (let i = 0; i < pos.count; i++) {
        const idx = i; // row-major order matches PlaneGeometry
        const elev = elevations[idx] !== undefined ? elevations[idx] : 0;
        pos.setY(i, elev * heightScale);

        // Color
        if (colorMode === 'height') {
          const t = (elev - minH) / hRange;
          const c = heightColor(t);
          colors[i * 3] = c[0];
          colors[i * 3 + 1] = c[1];
          colors[i * 3 + 2] = c[2];
        } else if (colorMode === 'gray') {
          const t = (elev - minH) / hRange;
          colors[i * 3] = t;
          colors[i * 3 + 1] = t;
          colors[i * 3 + 2] = t;
        } else {
          colors[i * 3] = 0.6;
          colors[i * 3 + 1] = 0.6;
          colors[i * 3 + 2] = 0.6;
        }
      }

      geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      geo.computeVertexNormals();

      const mat = new THREE.MeshPhongMaterial({
        vertexColors: true,
        side: THREE.DoubleSide,
        flatShading: false,
        shininess: 20,
      });

      terrainMesh = new THREE.Mesh(geo, mat);
      // Center the terrain
      terrainMesh.position.set(-(w - 1) / 2, 0, -(h - 1) / 2);
      scene.add(terrainMesh);

      // Camera position
      const maxDim = Math.max(w, h);
      camera.position.set(maxDim * 0.3, maxDim * heightScale * 0.8, maxDim * 0.8);
      controls.target.set(0, (minH + maxH) * heightScale * 0.5, 0);
      controls.update();
    }

    function heightColor(t) {
      // Blue → Green → Yellow → Red → White
      if (t < 0.25) {
        const s = t / 0.25;
        return [0.1 * (1 - s) + 0.18 * s, 0.35 * (1 - s) + 0.56 * s, 0.72 * (1 - s) + 0.24 * s];
      } else if (t < 0.5) {
        const s = (t - 0.25) / 0.25;
        return [0.18 * (1 - s) + 0.83 * s, 0.56 * (1 - s) + 0.63 * s, 0.24 * (1 - s) + 0.09 * s];
      } else if (t < 0.75) {
        const s = (t - 0.5) / 0.25;
        return [0.83 * (1 - s) + 0.85 * s, 0.63 * (1 - s) + 0.25 * s, 0.09 * (1 - s) + 0.25 * s];
      } else {
        const s = (t - 0.75) / 0.25;
        return [0.85 * (1 - s) + 1.0 * s, 0.25 * (1 - s) + 1.0 * s, 0.25 * (1 - s) + 1.0 * s];
      }
    }

    // ── Load GeoTIFF via WASM ──
    async function loadGeotiff(file) {
      showLoading('Reading file...');
      try {
        const buf = await file.arrayBuffer();
        showLoading('Parsing GeoTIFF...');

        // Check if WASM module is available
        if (typeof parseGeotiff === 'undefined') {
          // Fall back to pure JS parsing for demo without WASM build
          loadDemoTerrain();
          return;
        }

        const bytes = new Uint8Array(buf);
        const info = parseGeotiff(bytes);

        const w = info.width();
        const h = info.height();
        const elev = info.elevation();

        currentElevations = Array.from(elev);
        currentWidth = w;
        currentHeight = h;

        let minH = Infinity, maxH = -Infinity;
        for (const e of currentElevations) {
          if (e < minH) minH = e;
          if (e > maxH) maxH = e;
        }

        document.getElementById('statWidth').textContent = w + ' px';
        document.getElementById('statHeight').textContent = h + ' px';
        document.getElementById('statRes').textContent = info.resolution().toExponential(3) + '°/px';
        document.getElementById('statMin').textContent = minH.toFixed(2) + ' m';
        document.getElementById('statMax').textContent = maxH.toFixed(2) + ' m';
        document.getElementById('statPoints').textContent = (w * h).toLocaleString();

        try {
          const crs = JSON.parse(info.crs());
          document.getElementById('statCRS').textContent = crs.geographicType || crs.modelType || 'Unknown';
        } catch {
          document.getElementById('statCRS').textContent = 'Unknown';
        }

        document.getElementById('infoPanel').style.display = '';
        document.getElementById('infoBar').style.display = '';

        const scale = parseFloat(document.getElementById('heightScale').value);
        const mode = document.getElementById('colorMode').value;
        buildTerrain(currentElevations, w, h, scale, mode);

        hideLoading();
        hideError();
      } catch (e) {
        hideLoading();
        showError('Failed to parse GeoTIFF: ' + e.message);
        console.error(e);
      }
    }

    // ── Demo Terrain (generated) ──
    function loadDemoTerrain() {
      showLoading('Generating demo terrain...');
      const w = 128, h = 128;
      const elevations = new Float32Array(w * h);

      // Generate a realistic-ish terrain using multiple sine waves
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const nx = x / w, ny = y / h;
          let e = 0;
          // Mountains
          e += Math.sin(nx * 6.28 * 2 + 1.5) * Math.cos(ny * 6.28 * 1.5 + 0.3) * 200;
          e += Math.sin(nx * 6.28 * 5 + 3.0) * Math.sin(ny * 6.28 * 4 + 1.0) * 80;
          // Valley
          e += Math.cos((nx - 0.5) * 6.28 * 1.2) * 50 - 30;
          // Ridge
          const ridge = Math.exp(-((nx - 0.3) ** 2 + (ny - 0.4) ** 2) * 20) * 300;
          const ridge2 = Math.exp(-((nx - 0.7) ** 2 + (ny - 0.6) ** 2) * 15) * 250;
          e += ridge + ridge2;
          // Noise-like detail
          e += Math.sin(nx * 157 + ny * 313) * 15;
          e += Math.cos(nx * 97 + ny * 211) * 10;
          e += Math.sin(nx * 53 + ny * 127) * 5;

          elevations[y * w + x] = Math.max(0, e);
        }
      }

      currentElevations = Array.from(elevations);
      currentWidth = w;
      currentHeight = h;

      let minH = Infinity, maxH = -Infinity;
      for (const e of currentElevations) {
        if (e < minH) minH = e;
        if (e > maxH) maxH = e;
      }

      document.getElementById('statWidth').textContent = w + ' px';
      document.getElementById('statHeight').textContent = h + ' px';
      document.getElementById('statRes').textContent = 'Demo';
      document.getElementById('statMin').textContent = minH.toFixed(2) + ' m';
      document.getElementById('statMax').textContent = maxH.toFixed(2) + ' m';
      document.getElementById('statCRS').textContent = 'WGS 84 (simulated)';
      document.getElementById('statPoints').textContent = (w * h).toLocaleString();

      document.getElementById('infoPanel').style.display = '';
      document.getElementById('infoBar').style.display = '';

      const scale = parseFloat(document.getElementById('heightScale').value);
      const mode = document.getElementById('colorMode').value;
      buildTerrain(currentElevations, w, h, scale, mode);

      hideLoading();
      hideError();
    }

    // ── UI Helpers ──
    function showLoading(msg) {
      document.getElementById('loadingStatus').textContent = msg || 'Loading...';
      document.getElementById('loadingOverlay').style.display = 'flex';
    }
    function hideLoading() {
      document.getElementById('loadingOverlay').style.display = 'none';
    }
    function showError(msg) {
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorOverlay').style.display = 'flex';
    }
    function hideError() {
      document.getElementById('errorOverlay').style.display = 'none';
    }

    // ── Events ──
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) loadGeotiff(file);
    });
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) loadGeotiff(file);
    });

    document.getElementById('heightScale').addEventListener('input', (e) => {
      const scale = parseFloat(e.target.value);
      document.getElementById('scaleLabel').textContent = scale.toFixed(1) + '×';
      if (currentElevations) {
        const mode = document.getElementById('colorMode').value;
        buildTerrain(currentElevations, currentWidth, currentHeight, scale, mode);
      }
    });

    document.getElementById('colorMode').addEventListener('change', () => {
      if (currentElevations) {
        const scale = parseFloat(document.getElementById('heightScale').value);
        buildTerrain(currentElevations, currentWidth, currentHeight, scale, document.getElementById('colorMode').value);
      }
    });

    document.getElementById('loadDemoBtn').addEventListener('click', loadDemoTerrain);
    document.getElementById('dismissError').addEventListener('click', hideError);

    // ── Init ──
    init();
  </script>
</body>
</html>
