name: CI & Publish

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ------------------------------------------------------------------
  # 1. Rust checks — format, clippy, test (all features), WASM build
  # ------------------------------------------------------------------
  rust:
    name: Rust CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      # NOTE: MSRV verification removed — this is an experimental library that
      # tracks latest stable Rust. Dependencies (e.g. mvt crate) may use newer
      # language features. Pin MSRV if ever needed for downstream consumers.

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lints (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run unit tests (all features)
        run: cargo test --all-features --verbose -- --test-threads=2
        env:
          RAYON_NUM_THREADS: 1

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package (web target, point-cloud + geotiff)
        run: wasm-pack build --target web --release --out-dir pkg --features point-cloud,geotiff

      - name: Verify WASM output
        run: |
          test -f pkg/wasm_spatial_core_bg.wasm && echo "✅ WASM binary exists"
          test -s pkg/wasm_spatial_core_bg.wasm && echo "✅ WASM binary non-empty ($(stat -c%s pkg/wasm_spatial_core_bg.wasm) bytes)"
          test -f pkg/wasm_spatial_core.js && echo "✅ JS bindings exist"

      - name: Build WASM (Node.js target)
        run: wasm-pack build --target nodejs --release --out-dir pkg-node --features point-cloud,geotiff

      - name: Run WASM smoke tests (Node.js)
        run: WASM_PKG_DIR=pkg-node node tests/wasm_smoke_test.mjs

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: pkg/

  # ------------------------------------------------------------------
  # 2. Deploy Demo — GitHub Pages on push to master
  # ------------------------------------------------------------------
  demo:
    name: Deploy Demo to GitHub Pages
    needs: rust
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # ── GitHub Pages Setup ──
    # This job deploys to the `gh-pages` branch via peaceiris/actions-gh-pages.
    # Make sure your repo Settings → Pages is configured as:
    #   Source: Deploy from a branch
    #   Branch: gh-pages / (root)
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: pkg/

      - name: Assemble demo site
        run: |
          chmod +x scripts/build-demo-site.sh
          SKIP_WASM_BUILD=1 SITE_OUTPUT=_site bash scripts/build-demo-site.sh
          test -f _site/pkg/wasm_spatial_core_bg.wasm
          test -f _site/pkg/wasm_spatial_core.js
          echo "pkg files:" && ls -la _site/pkg/

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          commit_message: "deploy: demo site from CI"

  # ------------------------------------------------------------------
  # 3. Build Release Artifacts — all 3 variants on tag push
  # ------------------------------------------------------------------
  release-build:
    name: Build Release (${{ matrix.name }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: default
            features: ""
            out_dir: pkg
          - name: point-cloud
            features: "--features point-cloud,geotiff"
            out_dir: pkg-point-cloud
          - name: multi-thread
            features: ""
            out_dir: pkg-multi-thread
            nightly: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install nightly toolchain (multi-thread)
        if: matrix.nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.name }}

      - name: Build WASM (default / point-cloud)
        if: "!matrix.nightly"
        run: wasm-pack build --target web --release --out-dir ${{ matrix.out_dir }} ${{ matrix.features }}

      - name: Build WASM (multi-thread with atomics)
        if: matrix.nightly
        run: |
          RUSTFLAGS='-C target-feature=+atomics,+bulk-memory,+mutable-globals' \
          cargo +nightly build -Z build-std=panic_abort,std \
            --target wasm32-unknown-unknown --release --features multi-thread
          cargo install wasm-bindgen-cli --version 0.2.120
          wasm-bindgen --target web --out-dir ${{ matrix.out_dir }} \
            target/wasm32-unknown-unknown/release/wasm_spatial_core.wasm

      - name: Upload Release artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg-${{ matrix.name }}
          path: ${{ matrix.out_dir }}/

  # ------------------------------------------------------------------
  # 4. GitHub Release — upload all artifacts
  # ------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs: release-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          pattern: wasm-pkg-*
          merge-multiple: false

      - name: Create tarballs
        run: |
          cd release-artifacts
          for dir in wasm-pkg-*; do
            name="${dir#wasm-pkg-}"
            tar czf "../wasm-spatial-core-${name}.tar.gz" -C "$dir" .
          done
          cd ..
          ls -la wasm-spatial-core-*.tar.gz

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## wasm-spatial-core ${{ github.ref_name }}

            ### Downloads
            - **Default build** — `wasm-spatial-core-default.tar.gz` (zero-config, works everywhere)
            - **Point Cloud build** — `wasm-spatial-core-point-cloud.tar.gz` (with LAS/PCD parsing + voxel decimation + GeoTIFF terrain)
            - **Multi-thread build** — `wasm-spatial-core-multi-thread.tar.gz` (requires COOP/COEP headers)

            ### Changes
            ${{ steps.changelog.outputs.changelog }}
          files: |
            wasm-spatial-core-default.tar.gz
            wasm-spatial-core-point-cloud.tar.gz
            wasm-spatial-core-multi-thread.tar.gz

  # ------------------------------------------------------------------
  # 5. npm publish — only on version tags
  # ------------------------------------------------------------------
  publish-npm:
    name: Publish to npm
    needs: rust
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: pkg/

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Copy npm package files
        run: |
          cp npm/package.json pkg/package.json
          cp npm/tsconfig.json pkg/tsconfig.json 2>/dev/null || true
          cp npm/index.ts pkg/index.ts 2>/dev/null || true
          cp README.md pkg/README.md

      - name: Install npm dependencies
        working-directory: pkg
        run: npm install

      - name: Build TypeScript declarations
        working-directory: pkg
        run: npx tsc --project tsconfig.json --noEmit || true

      - name: Publish to npm
        working-directory: pkg
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ------------------------------------------------------------------
  # 6. Performance Benchmarks — only on master push
  # ------------------------------------------------------------------
  benchmark:
    name: Performance Benchmarks
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmark suite
        run: |
          cargo test --all-features -- benchmark_suite --ignored --nocapture 2>&1 | tee benchmark-results.jsonl

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.jsonl
          retention-days: 90
